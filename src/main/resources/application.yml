spring:
  application:
    name: ecommerce-java-springboot

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  security:
    jwt:
      secret-key: ${JWT_SECRET}
      expiration: ${TOKEN_EXPIRATION} # a day
      refresh-token:
        expiration: ${TOKEN_REFRESH} # seven days
